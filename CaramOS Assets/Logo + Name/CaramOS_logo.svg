<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
  width="512"
  height="512"
  version="1.1"
  id="caramost-logo"
  xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
  xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.0.0"
  xmlns="http://www.w3.org/2000/svg"
  xmlns:svg="http://www.w3.org/2000/svg">

  <sodipodi:namedview
    id="namedview"
    pagecolor="#ffffff"
    bordercolor="#000000"
    borderopacity="0.25"
    inkscape:showpageshadow="2"
    inkscape:pageopacity="0.0"
    inkscape:pagecheckerboard="0"
    inkscape:deskcolor="#d1d1d1" />

  <defs id="logo-defs">
    <!-- Múi khế: hình giọt cong, 5 múi xếp đối xứng tạo hình trái khế nhìn từ trên -->
    <path
      id="khe-mui"
      fill="#ffffff"
      stroke="#ffffff"
      stroke-width="5"
      stroke-linecap="round"
      stroke-linejoin="round"
      d="M0 0q50-35 0-100Q-50-35 0 0" />

    <!-- Hạt khế: hình giọt nhỏ nằm giữa mỗi múi, 5 hạt xếp tròn -->
    <path
      id="khe-hat"
      d="M0-50q10 20 0 40-10-20 0-40" />
  </defs>

  <!-- Biểu tượng trái khế -->
  <g id="logo-icon" transform="matrix(1.1 0 0 1.1 256 230)">

    <!-- Nền tròn vàng -->
    <circle
      id="bg-circle"
      r="140"
      fill="#f9a825"
      stroke="#f9a825"
      stroke-width="14" />

    <!-- 5 múi khế màu trắng -->
    <g id="khe-muis" stroke-linecap="round" stroke-linejoin="round" transform="scale(1.1)">
      <use href="#khe-mui" id="khe-mui-1" />
      <use href="#khe-mui" id="khe-mui-2" transform="rotate(72)" />
      <use href="#khe-mui" id="khe-mui-3" transform="rotate(144)" />
      <use href="#khe-mui" id="khe-mui-4" transform="rotate(-144)" />
      <use href="#khe-mui" id="khe-mui-5" transform="rotate(-72)" />
    </g>

    <!-- 5 hạt khế màu vàng, nằm giữa các múi -->
    <g id="khe-hats" fill="#f9a825">
      <use href="#khe-hat" id="khe-hat-1" />
      <use href="#khe-hat" id="khe-hat-2" transform="rotate(72)" />
      <use href="#khe-hat" id="khe-hat-3" transform="rotate(144)" />
      <use href="#khe-hat" id="khe-hat-4" transform="rotate(216)" />
      <use href="#khe-hat" id="khe-hat-5" transform="rotate(288)" />
    </g>

  </g>

  <!-- Tên thương hiệu -->
  <text
    id="logo-text"
    x="256"
    y="470"
    font-family="Comfortaa"
    font-size="64px"
    font-weight="900"
    letter-spacing="-3"
    text-anchor="middle">
    <tspan id="text-caram" fill="#f9a825">Caram</tspan><tspan id="text-os" fill="#000000">OS</tspan>
  </text>

</svg>