<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!--
  CaramOS — Horizontal Lockup
  Dạng: Icon trái + Wordmark phải (horizontal lockup)
  Dùng cho: góc dưới phải wallpaper, nền tối
  Canvas: 480 x 160
-->

<svg
   width="770"
   height="160"
   version="1.1"
   id="caramost-lockup"
   sodipodi:docname="caramost-lockup.svg"
   inkscape:version="1.4.3 (0d15f75042, 2025-12-25)"
   inkscape:export-filename="caramost-lockup.png"
   inkscape:export-xdpi="96"
   inkscape:export-ydpi="96"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg"
   xmlns:sodipodi0="http://sodipodi.sourceforge.net/DTD/sodipodi-0.0.0">
  <sodipodi:namedview
     id="namedview1"
     pagecolor="#ffffff"
     bordercolor="#000000"
     borderopacity="0.25"
     inkscape:showpageshadow="2"
     inkscape:pageopacity="0.0"
     inkscape:pagecheckerboard="0"
     inkscape:deskcolor="#d1d1d1"
     inkscape:zoom="1.1754502"
     inkscape:cx="370.9217"
     inkscape:cy="-77.417144"
     inkscape:window-width="1920"
     inkscape:window-height="1006"
     inkscape:window-x="0"
     inkscape:window-y="0"
     inkscape:window-maximized="1"
     inkscape:current-layer="caramost-lockup" />
  <sodipodi0:namedview
     id="namedview"
     pagecolor="#1e1e2e"
     bordercolor="#444444"
     borderopacity="0.5"
     inkscape:showpageshadow="2"
     inkscape:pageopacity="1.0"
     inkscape:pagecheckerboard="0"
     inkscape:deskcolor="#1e1e2e" />
  <defs
     id="logo-defs">
    <!-- Múi khế: hình giọt cong, 5 múi xếp đối xứng tạo hình trái khế nhìn từ trên -->
    <path
       id="khe-mui"
       fill="#ffffff"
       stroke="#ffffff"
       stroke-width="5"
       stroke-linecap="round"
       stroke-linejoin="round"
       d="M0 0q50-35 0-100Q-50-35 0 0" />
    <!-- Hạt khế: hình giọt nhỏ nằm giữa mỗi múi, 5 hạt xếp tròn -->
    <path
       id="khe-hat"
       d="M0-50q10 20 0 40-10-20 0-40" />
  </defs>
  <!--
    Biểu tượng trái khế — thu nhỏ về 160×160 để vừa chiều cao canvas.
    Scale tính từ r_hiệu_dụng = 140 * 1.1 = 154px → target radius = 76px
    → scale_factor = 76 / 154 ≈ 0.494; đặt tâm tại (80, 80)
  -->
  <g
     id="logo-icon"
     transform="matrix(0.494,0,0,0.494,82,80)">
    <!-- Nền tròn vàng -->
    <circle
       id="bg-circle"
       r="140"
       fill="#f9a825"
       stroke="#f9a825"
       stroke-width="14"
       cx="0"
       cy="0" />
    <!-- 5 múi khế màu trắng -->
    <g
       id="khe-muis"
       stroke-linecap="round"
       stroke-linejoin="round"
       transform="scale(1.1)">
      <use
         href="#khe-mui"
         id="khe-mui-1" />
      <use
         href="#khe-mui"
         id="khe-mui-2"
         transform="rotate(72)" />
      <use
         href="#khe-mui"
         id="khe-mui-3"
         transform="rotate(144)" />
      <use
         href="#khe-mui"
         id="khe-mui-4"
         transform="rotate(-144)" />
      <use
         href="#khe-mui"
         id="khe-mui-5"
         transform="rotate(-72)" />
    </g>
    <!-- 5 hạt khế màu vàng, nằm giữa các múi -->
    <g
       id="khe-hats"
       fill="#f9a825">
      <use
         href="#khe-hat"
         id="khe-hat-1" />
      <use
         href="#khe-hat"
         id="khe-hat-2"
         transform="rotate(72)" />
      <use
         href="#khe-hat"
         id="khe-hat-3"
         transform="rotate(144)" />
      <use
         href="#khe-hat"
         id="khe-hat-4"
         transform="rotate(-144)" />
      <use
         href="#khe-hat"
         id="khe-hat-5"
         transform="rotate(-72)" />
    </g>
  </g>
  <!--
    Wordmark — canh giữa theo trục dọc (dominant-baseline="central" + y=80)
    "Caram" vàng + "OS" trắng (thay đen vì nền tối)
    Khoảng cách từ mép icon (~156px) + gap 16px → x bắt đầu tại 172
  -->
  <text
     id="lockup-text"
     x="168.78125"
     y="92.043869"
     font-family="Comfortaa"
     font-size="120px"
     font-weight="900"
     letter-spacing="-3"
     dominant-baseline="central"
     text-anchor="start"><tspan
       id="text-caram"
       fill="#f9a825">Caram</tspan><tspan
       id="text-os"
       fill="#f9a825">OS</tspan></text>
</svg>
