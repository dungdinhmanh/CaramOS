<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="512"
   height="512"
   viewBox="0 0 512 512"
   version="1.1"
   id="caramost-logo-icon"
   sodipodi:docname="CaramOS_logo_icon.svg"
   inkscape:export-filename="CaramOS_only_icon.png"
   inkscape:export-xdpi="96"
   inkscape:export-ydpi="96"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">
  <sodipodi:namedview
     id="namedview1"
     pagecolor="#ffffff"
     bordercolor="#000000"
     borderopacity="0.25"
     inkscape:showpageshadow="2"
     inkscape:pageopacity="0.0"
     inkscape:pagecheckerboard="0"
     inkscape:deskcolor="#d1d1d1">
    <inkscape:page
       x="0"
       y="0"
       width="512"
       height="512"
       id="page2"
       margin="0"
       bleed="0" />
  </sodipodi:namedview>
  <defs
     id="logo-defs">
    <!-- Múi khế: hình giọt cong, 5 múi xếp đối xứng tạo hình trái khế nhìn từ trên -->
    <path
       id="khe-mui"
       fill="#ffffff"
       stroke="#ffffff"
       stroke-width="5"
       stroke-linecap="round"
       stroke-linejoin="round"
       d="M 0,0 Q 50,-35 0,-100 -50,-35 0,0" />
    <!-- Hạt khế: hình giọt nhỏ nằm giữa mỗi múi, 5 hạt xếp tròn -->
    <path
       id="khe-hat"
       d="m 0,-50 q 10,20 0,40 -10,-20 0,-40" />
  </defs>
  <!-- Biểu tượng trái khế -->
  <g
     id="logo-icon"
     transform="matrix(1.6776672,0,0,1.6776672,256,256)">
    <!-- Nền tròn vàng -->
    <circle
       id="bg-circle"
       r="140"
       fill="#f9a825"
       stroke="#f9a825"
       stroke-width="14"
       cx="0"
       cy="0" />
    <!-- 5 múi khế màu trắng -->
    <g
       id="khe-muis"
       stroke-linecap="round"
       stroke-linejoin="round"
       transform="scale(1.1)">
      <use
         href="#khe-mui"
         id="khe-mui-1" />
      <use
         href="#khe-mui"
         id="khe-mui-2"
         transform="rotate(72)" />
      <use
         href="#khe-mui"
         id="khe-mui-3"
         transform="rotate(144)" />
      <use
         href="#khe-mui"
         id="khe-mui-4"
         transform="rotate(-144)" />
      <use
         href="#khe-mui"
         id="khe-mui-5"
         transform="rotate(-72)" />
    </g>
    <!-- 5 hạt khế màu vàng, nằm giữa các múi -->
    <g
       id="khe-hats"
       fill="#f9a825">
      <use
         href="#khe-hat"
         id="khe-hat-1" />
      <use
         href="#khe-hat"
         id="khe-hat-2"
         transform="rotate(72)" />
      <use
         href="#khe-hat"
         id="khe-hat-3"
         transform="rotate(144)" />
      <use
         href="#khe-hat"
         id="khe-hat-4"
         transform="rotate(-144)" />
      <use
         href="#khe-hat"
         id="khe-hat-5"
         transform="rotate(-72)" />
    </g>
  </g>
</svg>
